name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install AutoHotkey v2 + Ahk2Exe
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          function Get-LatestZip($repo, $pattern) {
            $headers = @{ 'User-Agent' = 'mac-keys-for-windows-ci' }
            if ($env:GITHUB_TOKEN) { $headers['Authorization'] = "Bearer $env:GITHUB_TOKEN" }
            $release = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/$repo/releases/latest"
            $asset = $release.assets | Where-Object { $_.name -like $pattern } | Select-Object -First 1
            if (-not $asset) { throw "No asset matching $pattern in $repo" }
            return $asset.browser_download_url
          }

          $ahkDir = "$env:RUNNER_TEMP\ahk"
          New-Item -ItemType Directory -Force -Path $ahkDir | Out-Null
          $ahkZip = "$env:RUNNER_TEMP\ahk.zip"
          Invoke-WebRequest -Uri (Get-LatestZip 'AutoHotkey/AutoHotkey' 'AutoHotkey_*.zip') -OutFile $ahkZip -Headers @{ 'User-Agent' = 'mac-keys-for-windows-ci' }
          Expand-Archive -Path $ahkZip -DestinationPath $ahkDir -Force

          $a2eDir = Join-Path $ahkDir 'Compiler'
          New-Item -ItemType Directory -Force -Path $a2eDir | Out-Null
          $a2eZip = "$env:RUNNER_TEMP\ahk2exe.zip"
          Invoke-WebRequest -Uri (Get-LatestZip 'AutoHotkey/Ahk2Exe' 'Ahk2Exe*.zip') -OutFile $a2eZip -Headers @{ 'User-Agent' = 'mac-keys-for-windows-ci' }
          Expand-Archive -Path $a2eZip -DestinationPath $a2eDir -Force

          Write-Host 'AHK dir contents:'
          Get-ChildItem $ahkDir | Format-Table Name, Length
          Write-Host 'Compiler dir contents:'
          Get-ChildItem $a2eDir | Format-Table Name, Length

          "AHK_DIR=$ahkDir" | Out-File -Append -FilePath $env:GITHUB_ENV

      - name: Compile mac-keys.exe
        shell: pwsh
        run: |
          $ahk2exe = Get-ChildItem -Path (Join-Path $env:AHK_DIR 'Compiler') -Filter 'Ahk2Exe.exe' -Recurse | Select-Object -First 1
          if (-not $ahk2exe) { throw 'Ahk2Exe.exe not found under Compiler/' }
          $base = Join-Path $env:AHK_DIR 'AutoHotkey64.exe'
          if (-not (Test-Path $base)) { throw "Base exe not found: $base" }
          Write-Host "Using $($ahk2exe.FullName) + $base"
          $proc = Start-Process -FilePath $ahk2exe.FullName -ArgumentList @('/in','mac-keys.ahk','/out','mac-keys.exe','/base',$base) -Wait -NoNewWindow -PassThru
          if ($proc.ExitCode -ne 0) { throw "Ahk2Exe exited with $($proc.ExitCode)" }
          if (-not (Test-Path 'mac-keys.exe')) { throw 'Build failed: output file missing after Ahk2Exe completed' }
          Write-Host "Built mac-keys.exe ($((Get-Item 'mac-keys.exe').Length) bytes)"

      - name: Package release zip
        shell: pwsh
        run: |
          $stage = 'release-staging'
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item 'mac-keys.exe'          $stage
          Copy-Item 'config.default.json'   $stage
          Copy-Item 'install.ps1'           $stage
          Copy-Item 'uninstall.ps1'         $stage
          Copy-Item 'README.md'             $stage
          Copy-Item 'LICENSE'               $stage
          if (Test-Path 'assets') {
              Copy-Item 'assets' -Destination $stage -Recurse
          }
          Compress-Archive -Path "$stage\*" -DestinationPath 'mac-keys-for-windows.zip' -Force

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mac-keys-for-windows.zip
            mac-keys.exe
          generate_release_notes: true

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-keys-for-windows
          path: |
            mac-keys.exe
            mac-keys-for-windows.zip
