name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install AutoHotkey v2
        shell: pwsh
        run: |
          $headers = @{ 'User-Agent' = 'mac-keys-for-windows-ci' }
          if ($env:GITHUB_TOKEN) { $headers['Authorization'] = "Bearer $env:GITHUB_TOKEN" }
          $release = Invoke-RestMethod -Headers $headers -Uri 'https://api.github.com/repos/AutoHotkey/AutoHotkey/releases/latest'
          $asset = $release.assets | Where-Object { $_.name -like 'AutoHotkey_*.zip' } | Select-Object -First 1
          if (-not $asset) { throw 'AutoHotkey zip asset not found in latest release' }
          Write-Host "Downloading $($asset.name) ..."
          $zip = "$env:RUNNER_TEMP\ahk.zip"
          $dest = "$env:RUNNER_TEMP\ahk"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $zip -Headers @{ 'User-Agent' = 'mac-keys-for-windows-ci' }
          Expand-Archive -Path $zip -DestinationPath $dest -Force
          Get-ChildItem $dest -Recurse -Filter 'Ahk2Exe.exe' | ForEach-Object { Write-Host "Found: $($_.FullName)" }
          "AHK_DIR=$dest" | Out-File -Append -FilePath $env:GITHUB_ENV
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile mac-keys.exe
        shell: pwsh
        run: |
          $ahk2exe = Join-Path $env:AHK_DIR 'Compiler\Ahk2Exe.exe'
          $base    = Join-Path $env:AHK_DIR 'AutoHotkey64.exe'
          if (-not (Test-Path $ahk2exe)) { throw "Ahk2Exe not found at $ahk2exe" }
          & $ahk2exe /in "mac-keys.ahk" /out "mac-keys.exe" /base "$base"
          if (-not (Test-Path 'mac-keys.exe')) { throw 'Build failed' }

      - name: Package release zip
        shell: pwsh
        run: |
          $stage = 'release-staging'
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item 'mac-keys.exe'          $stage
          Copy-Item 'config.default.json'   $stage
          Copy-Item 'install.ps1'           $stage
          Copy-Item 'uninstall.ps1'         $stage
          Copy-Item 'README.md'             $stage
          Copy-Item 'LICENSE'               $stage
          Compress-Archive -Path "$stage\*" -DestinationPath 'mac-keys-for-windows.zip' -Force

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mac-keys-for-windows.zip
            mac-keys.exe
          generate_release_notes: true

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-keys-for-windows
          path: |
            mac-keys.exe
            mac-keys-for-windows.zip
